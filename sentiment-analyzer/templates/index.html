{% extends 'base.html' %}

{% block content %}
<div class="glass-card">
    <div class="text-center">
        <h1>Sentiment Analyzer</h1>
        <p class="subtitle">Powered by Python & TextBlob — detects tone accurately</p>
    </div>

    <div class="mb-4">
        <textarea id="inputText" class="form-control" rows="4" placeholder="Type or paste any text here to analyze its sentiment..."></textarea>
        <div id="errorMsg" class="invalid-feedback d-block mt-2 fw-medium"></div>
    </div>
    
    <!-- Button is kept for accessibility or explicit submit, but analysis is mostly automatic now -->
    <button id="analyzeBtn" class="btn btn-analyze w-100 mb-4" onclick="analyze()" style="display: none;">
        Analyze Sentiment
    </button>

    <div id="result">
        <hr class="mb-4 opacity-25">
        <div class="text-center">
            <div class="result-badge mb-2" id="emoji"></div>
            <div class="result-label" id="label"></div>
        </div>

        <div class="row g-3 mb-4">
            <div class="col-6">
                <div class="metric-card text-center h-100">
                    <div class="metric-val" id="polarity">0.000</div>
                    <div class="metric-lbl mt-1">Polarity</div>
                </div>
            </div>
            <div class="col-6">
                <div class="metric-card text-center h-100">
                    <div class="metric-val" id="subjectivity">0.000</div>
                    <div class="metric-lbl mt-1">Subjectivity</div>
                </div>
            </div>
        </div>

        <div>
            <div class="d-flex justify-content-between align-items-center mb-2">
                <span class="metric-lbl mb-0">Sentiment Strength</span>
                <span id="barPct" class="fw-bold" style="color: var(--text-muted); font-size: 0.875rem;">0%</span>
            </div>
            <div class="progress">
                <div class="progress-bar" id="barFill" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100"></div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    let debounceTimer;

    // Smooth counter animation for metrics
    function animateValue(obj, start, end, duration, isFloat = false) {
        let startTimestamp = null;
        const step = (timestamp) => {
            if (!startTimestamp) startTimestamp = timestamp;
            const progress = Math.min((timestamp - startTimestamp) / duration, 1);
            let currentVal = start + progress * (end - start);
            
            if (isFloat) {
                obj.textContent = (currentVal > 0 && end > 0 ? "+" : "") + currentVal.toFixed(3);
            } else {
                obj.textContent = Math.round(currentVal);
            }
            
            if (progress < 1) {
                window.requestAnimationFrame(step);
            } else {
                obj.textContent = (end > 0 && isFloat ? "+" : "") + (isFloat ? end.toFixed(3) : end);
            }
        };
        window.requestAnimationFrame(step);
    }

    async function analyze() {
        const text = document.getElementById("inputText").value;
        const err = document.getElementById("errorMsg");
        const resultDiv = document.getElementById("result");
        const root = document.documentElement;
        
        err.textContent = "";

        // If empty, hide results and reset background
        if (!text.trim()) {
            resultDiv.style.display = "none";
            root.style.setProperty('--bg-color-1', 'rgba(99, 102, 241, 0.4)');
            root.style.setProperty('--bg-color-2', 'rgba(236, 72, 153, 0.3)');
            root.style.setProperty('--bg-color-3', 'rgba(16, 185, 129, 0.2)');
            return;
        }

        try {
            const res = await fetch("/analyze", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ text })
            });
            const data = await res.json();
            
            if (data.error) { 
                err.textContent = data.error; 
                return; 
            }

            // Show results
            resultDiv.style.display = "block";
            
            // Set basic info
            document.getElementById("emoji").textContent = data.emoji;
            const lbl = document.getElementById("label");
            lbl.textContent = data.label;
            lbl.className = "result-label " + data.label;
            
            // Animate metrics
            const polarityEl = document.getElementById("polarity");
            const subjEl = document.getElementById("subjectivity");
            const currentPol = parseFloat(polarityEl.textContent || "0");
            const currentSubj = parseFloat(subjEl.textContent || "0");
            
            animateValue(polarityEl, currentPol, data.polarity, 600, true);
            animateValue(subjEl, currentSubj, data.subjectivity, 600, true);

            // Set progress bar
            const pct = Math.round(Math.abs(data.polarity) * 100);
            
            const pctEl = document.getElementById("barPct");
            const currentPct = parseInt(pctEl.textContent || "0");
            
            animateValue(pctEl, currentPct, pct, 600, false);
            setTimeout(() => { pctEl.textContent = pct + "%"; }, 650);
            
            const fill = document.getElementById("barFill");
            let colorVar = "var(--warning-color)";
            
            // Dynamic Background based on Sentiment
            if (data.label === "Positive") {
                colorVar = "var(--success-color)";
                root.style.setProperty('--bg-color-1', 'rgba(34, 197, 94, 0.4)');
                root.style.setProperty('--bg-color-2', 'rgba(16, 185, 129, 0.3)');
                root.style.setProperty('--bg-color-3', 'rgba(132, 204, 22, 0.2)');
            } else if (data.label === "Negative") {
                colorVar = "var(--danger-color)";
                root.style.setProperty('--bg-color-1', 'rgba(239, 68, 68, 0.4)');
                root.style.setProperty('--bg-color-2', 'rgba(244, 63, 94, 0.3)');
                root.style.setProperty('--bg-color-3', 'rgba(225, 29, 72, 0.2)');
            } else {
                root.style.setProperty('--bg-color-1', 'rgba(245, 158, 11, 0.4)');
                root.style.setProperty('--bg-color-2', 'rgba(251, 191, 36, 0.3)');
                root.style.setProperty('--bg-color-3', 'rgba(217, 119, 6, 0.2)');
            }
            
            fill.style.backgroundColor = colorVar;
            fill.style.width = pct + "%";
            
        } catch (error) {
            err.textContent = "An error occurred while connecting to the server.";
        }
    }

    // Trigger analysis as user types (Debounced)
    document.getElementById('inputText').addEventListener('input', function() {
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(() => {
            analyze();
        }, 500); // Wait 500ms after user stops typing
    });
</script>
{% endblock %}
